<!DOCTYPE html>
<html lang="en">
<head>

<link href='https://fonts.googleapis.com/css?family=Oregano' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Metal' rel='stylesheet'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Booking</title>
<style>

  body {
    font-family:Oregano;
    font-size:24px;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #bgVideo {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: -2; /* behind everything */
}

/* Overlay layer */
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,128,128,0.4));
  backdrop-filter:blur(4px);
  z-index: -1; /* above video, below form */
  animation: gradientShift 10s ease-in-out infinite;

}


@keyframes gradientShift {
  0% { background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,128,128,0.4)); }
  50% { background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,128,128,0.6)); }
  100% { background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,128,128,0.4)); }
}

  /* Form container */
  .form-container {
    width: 420px;
    border:  1px solid rgba(255,255,255,0.3);
    border-radius:25px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    overflow: hidden;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: float 2s ease-in-out infinite;
    position:relative;
    z-index:1;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .form-step {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    text-align: center;
    transform: translateX(100%);
    opacity: 0;
    transition: transform 0.5s ease, opacity 0.5s ease;
  }

  .form-step.active {
    display: flex;
    transform: translateX(0);
    opacity: 1;
  }

  h2 {
    font-size: 28px;
  color: teal;
  margin-bottom: 20px;
  border-bottom: 2px solid #00c9a7;
  padding-bottom: 10px;
  }

  input, textarea {
    width: 80%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #aaa;
    font-size: 20px;
    outline: none;
    text-align: center;
    transition: 0.3s;
    font-family:Oregano;
  }

  input:focus, textarea:focus {
    border-color: #0077b6;
    box-shadow:  0 0 8px rgba(0,119,182,0.3);
  }

  .btn-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
  }

  button {
    cursor: pointer;
    padding: 10px 20px;
    border-radius: 15px;
    border: none;
    font-weight: 600;
    transition: 0.3s;
    font-family:Seorge Script;
  }

  .btn-confirm { background: #00c9a7; color: white;  box-shadow: 0 4px 10px rgba(0,201,167,0.4);}
  .btn-confirm:hover { background: #009e83; box-shadow: 0 6px 15px rgba(0,201,167,0.6); }
  .btn-next {background: #00c9a7; color: white; box-shadow: 0 4px 10px rgba(0,201,167,0.4); }
  .btn-next:hover { background: #009e83; box-shadow: 0 6px 15px rgba(0,201,167,0.6); }
  .btn-close { background: #577590; color: white; }
  .btn-close:hover { background: #495867; }

  .help-btn {
    flex: 1;
    padding: 12px;
    border-radius: 15px;
    border: 2px solid teal;
    background: white;
    color:teal;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
    font-family:Seorge Script;
  }

  .help-btn:hover {background: rgba(0,201,167,0.5); color: #fff; }
  .help-btn.selected { background: #00c9a7; color: #fff; }

  .title-card {
    margin: 15px 0 10px 0;
    font-size:20px;
    color:teal;
    font-weight:600;
  }

/* ========== TRIP BOOKING FORM MOBILE ========== */
@media (max-width: 768px) {

  body {
    padding: 20px;
    height: auto;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .form-container {
    width: 100%;
    max-width: 420px;   /* keeps it neat */
    margin: 0 auto;

</style>
</head>
<body>

<video autoplay muted loop playsinline id="bgVideo">
    <source src="videos/v12.mp4" type="video/mp4">
  </video>

<div class="overlay"></div>

<div class="form-container">

  <!-- Step 1 -->
  <div id="step1" class="form-step active">
    <h2>Book Your Trip</h2>
    <input type="text" id="tripNameInput" placeholder="Trip Selected">

    <input type="text" id="userName" placeholder="Your Name">
    <input type="email" id="userEmail" placeholder="Your Email">

    <div class="btn-group">
      <button class="btn-confirm" onclick="nextStep()">Next</button>
      <button class="btn-close" onclick="closeForm()">Close</button>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="step2" class="form-step">
    <h2>Trip Details</h2>

    <input type="date" id="travelDate">
    <input type="number" id="travelers" placeholder="Number of Travelers" min="1" max="20">
    <textarea id="specialNotes" rows="3" placeholder="Any special requests?"></textarea>

    <div class="title-card">Need help with hotels/transport/tours?</div>
    <div style="display:flex; gap:15px; width: 80%; margin:0 auto;">
      <div id="helpYesBtn" class="help-btn" onclick="selectHelp('yes')">Yes, please!</div>
      <div id="helpNoBtn" class="help-btn selected" onclick="selectHelp('no')">No, thanks</div>
    </div>

    <div class="btn-group">
      <button class="btn-next" onclick="finalizeBooking()">Confirm</button>
      <button class="btn-close" onclick="prevStep()">Back</button>
    </div>
  </div>

</div>

<script>
// Autofill trip from URL
function getTripFromURL() {
    const params = new URLSearchParams(window.location.search);
    const trip = params.get('trip');
    if(trip){
        document.getElementById("tripNameInput").value = trip;
    }
}
window.onload = getTripFromURL;

let helpChoice = 'no';

function selectHelp(choice){
  helpChoice = choice;
  document.getElementById('helpYesBtn').classList.remove('selected');
  document.getElementById('helpNoBtn').classList.remove('selected');
  if(choice === 'yes') document.getElementById('helpYesBtn').classList.add('selected');
  else document.getElementById('helpNoBtn').classList.add('selected');
}

function nextStep(){
  const name = document.getElementById("userName").value.trim();
  const email = document.getElementById("userEmail").value.trim();
  if(!name || !email){ alert("Enter name and email!"); return; }
  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.add("active");
}

function prevStep(){
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step1").classList.add("active");
}

function closeForm(){
  document.querySelector(".form-container").style.display = "none";
  window.location.href="destinations1.html";
}

function finalizeBooking(){
  const trip = document.getElementById("tripNameInput").value;
  const name = document.getElementById("userName").value.trim();
  const email = document.getElementById("userEmail").value.trim();
  const date = document.getElementById("travelDate").value;
  const travelers = document.getElementById("travelers").value;
  const notes = document.getElementById("specialNotes").value;

  let today = new Date().toISOString().split("T")[0];

  // ===== VALIDATIONS =====
  if(name.length < 3){
    alert("Name must be at least 3 characters!");
    return;
  }

  if(!email.match(/^[^ ]+@[^ ]+\.[a-z]{2,3}$/)){
    alert("Enter valid email!");
    return;
  }

  if(!date){
    alert("Please select a travel date!");
    return;
  }

  if(date < today){
    alert("Travel date cannot be in the past!");
    return;
  }

  if(!travelers || travelers <= 0){
    alert("Enter valid number of travelers!");
    return;
  }

  // ===== STORE DATA =====
  localStorage.setItem("trip", trip);
  localStorage.setItem("name", name);
  localStorage.setItem("email", email);
  localStorage.setItem("travelDate", date);
  localStorage.setItem("travelers", travelers);
  localStorage.setItem("notes", notes);

  // ===== SUCCESS MESSAGE =====
  let message = `🎉 Booking Confirmed! 🎉
Trip: ${trip}
Name: ${name}
Email: ${email}
Date: ${date}
Travelers: ${travelers}
Notes: ${notes || "None"}`;

  if(helpChoice === "yes"){
    message += "\n✅ Our team will contact you for hotel/transport/tour help!";
  }

  alert(message);

  // ===== REDIRECT LAST =====
  window.location.href = "travel1.html"; 
}
</script>

</body>
</html>
